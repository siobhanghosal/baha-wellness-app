name: baha_ui_prototype
description: Award-style Flutter UI prototype for BAHA Wellness Companion. Fake data only.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.8.1
  flutter_animate: ^4.5.2
  google_fonts: ^6.2.1
  percent_indicator: ^4.2.4
  fl_chart: ^0.69.2
  smooth_page_indicator: ^1.2.0+3
  confetti: ^0.8.0
  shimmer: ^3.0.0
  salomon_bottom_bar: ^3.3.2
  phosphor_flutter: ^2.1.0
  flutter_staggered_animations: ^1.1.1
  carousel_slider: ^5.0.0
  badges: ^3.1.2
  avatar_glow: ^3.0.1
  shared_preferences: ^2.5.5

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/icons/
    - assets/illustrations/

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
