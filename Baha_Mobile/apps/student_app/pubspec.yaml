name: student_app
description: Student app entry point for the BAHA mobile suite.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  baha_api_client:
    path: ../../packages/baha_api_client
  baha_auth_session:
    path: ../../packages/baha_auth_session
  baha_content_renderer:
    path: ../../packages/baha_content_renderer
  baha_design_system:
    path: ../../packages/baha_design_system
  baha_shared_models:
    path: ../../packages/baha_shared_models
  confetti: ^0.8.0
  fl_chart: ^1.1.1
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  google_fonts: ^6.3.2
  percent_indicator: ^4.2.5
  salomon_bottom_bar: ^3.3.2
  shared_preferences: ^2.5.3
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
