services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: baha_companion
      POSTGRES_USER: baha
      POSTGRES_PASSWORD: baha
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baha -d baha_companion"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://baha:baha@postgres:5432/baha_companion
      AUTH_SECRET_KEY: change-me-in-production
      RUN_MIGRATIONS: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8000/health/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
