apiVersion: apps/v1
kind: Deployment
metadata:
  name: baha-rag-api
  namespace: baha-rag
spec:
  replicas: 2
  selector:
    matchLabels:
      app: baha-rag-api
  template:
    metadata:
      labels:
        app: baha-rag-api
    spec:
      containers:
        - name: api
          image: baha-rag-api:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: baha-rag-config
            - secretRef:
                name: baha-rag-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          volumeMounts:
            - name: acquisition-storage
              mountPath: /data/raw
      volumes:
        - name: acquisition-storage
          persistentVolumeClaim:
            claimName: acquisition-storage
